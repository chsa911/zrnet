server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 50m;

  location = /technik { return 301 /info/so-funktionierts; }
  location = /faq { return 301 /info/faq; }
  location = /impressum { return 301 /info/impressum; }
  location = /datenschutz { return 301 /info/datenschutz; }

  location = /technik.html { return 301 /info/so-funktionierts; }
  location = /ausruestung.html { return 301 /info/so-funktionierts; }
  location = /faq.html { return 301 /info/faq; }
  location = /haeufige_fragen.html { return 301 /info/faq; }
  location = /haeufige_fragen_d.html { return 301 /info/faq; }
  location = /impressum.html { return 301 /info/impressum; }
  location = /impressum_d.html { return 301 /info/impressum; }
  location = /datenschutz.html { return 301 /info/datenschutz; }

  set $img_ext "";
  if ($http_accept ~* "webp") { set $img_ext ".webp"; }
  if ($http_accept ~* "avif") { set $img_ext ".avif"; }

  location ~* ^(/assets/images/.+)\.(?:png|jpe?g)$ {
    add_header Vary Accept;
    try_files $1$img_ext $uri =404;
    access_log off;
    expires 30d;
  }

  location /assets/ {
    try_files $uri =404;
    access_log off;
    expires 7d;
  }

  location /spa/ {
    try_files $uri =404;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location /api/ {
    proxy_pass http://backend:4000;
      proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
location /media/ {
  proxy_pass http://backend:4000;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
}

  location = / {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files /index.html =404;
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  }

  location / {
    try_files $uri $uri/ @spa;
  }

  location @spa {
    default_type text/html;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files /index.html =404;
  }
}