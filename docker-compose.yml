services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - UPLOAD_ROOT=/uploads
    volumes:
      - /srv/zrnet/uploads:/uploads
      - /srv/zrnet/frontend/public/assets/covers:/frontend/public/assets/covers:ro
    expose:
      - "4000"
    restart: unless-stopped
    networks:
      - default

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - VITE_API_BASE_URL=/api
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - default

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - default
      - staging_internal

volumes:
  caddy_data:
  caddy_config:

networks:
  default:
    name: zrnet_default
  staging_internal:
    external: true
    name: zrnet-staging_internal